<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawCare — Register</title>
  <link rel="stylesheet" href="register.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">
    <header class="nav">
      <div class="brand">
        <div class="logo-blob"></div>
        <h1>
          <img class="logo-img" src="/Photos/Paw.jpeg" alt="PawCare Logo">
          🐾 Paw<span>Care</span>
        </h1>
      </div>
      <nav class="main-nav">
      <a href="/home/home.html">Home</a>
      <a href="/about/about.html">About</a>
      <a class="active" href="/donation/donation.html">Donate</a>
      <div class="nav-dropdown" id="careDropdown">
        <a href="#" class="dropdown-toggle">Care Support ▾</a>
        <div class="dropdown-menu">
          <div class="dropdown-menu-inner">
            <a href="/map/map.html">🗺️ Vet</a>
            <a href="/sitter/sitter.html">🏠 Pet Care</a>
          </div>
        </div>
      </div>
      <a href="/blog/blog.html">Blog</a>
      <a href="/dashboard/dashboard.html">Dashboard</a>
    </nav>
    </header>

    <main class="register-hero">
      <aside class="register-card tilt-card" data-tilt>
        <div class="card-top">
          <img class="pet-face cat" src="/Photos/mimi.jpg" alt="cat">
          <img class="pet-face dog" src="/Photos/dog.jpg" alt="dog">
        </div>

        <h3>Create Account</h3>
        <p class="muted">Join PawCare and start helping pets today</p>

        <form id="registerForm" class="register-form">
          <input type="text" id="name" placeholder="Full Name" required>
          <input type="email" id="email" placeholder="Email" required>
          <input type="password" id="password" placeholder="Password" required>
          <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
          <button type="submit" class="primary">Register</button>
        </form>

        <div class="small-note">Already have an account? <a href="/index/index.html">Login</a></div>
      </aside>
    </main>

    <footer class="footer">
      <p>© 2025 PawCare • Built by Tanmay</p>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
  <script src="register.js"></script>
</body>
</html>
